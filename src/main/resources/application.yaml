spring:
  application:
    name: razorPay
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/razorpayDB}
    username: ${DB_USER:}
    password: ${DB_PASS:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect